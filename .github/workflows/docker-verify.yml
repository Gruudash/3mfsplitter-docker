name: Docker Build Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: 3mfsplitter:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d --name 3mfsplitter-ci -p 8000:8000 3mfsplitter:ci

      - name: Wait for health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/health > /dev/null; then
              echo "Service is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Service did not become healthy in time"
          docker logs 3mfsplitter-ci
          exit 1

      - name: Build a minimal test .3mf file
        run: python3 .github/scripts/make_ci_test_3mf.py ci_test.3mf

      - name: Split smoke test
        run: |
          http_code=$(curl -s -o response.zip -w "%{http_code}" \
            -F "file=@ci_test.3mf" -F "connector=none" \
            http://localhost:8000/api/split)
          echo "HTTP status: $http_code"
          if [ "$http_code" != "200" ]; then
            echo "::error::Expected HTTP 200 from /api/split, got $http_code"
            cat response.zip
            exit 1
          fi
          unzip -l response.zip
          unzip -p response.zip colors.json
          if ! unzip -l response.zip | grep -q "colors.json"; then
            echo "::error::colors.json legend missing from split output"
            exit 1
          fi
          if ! unzip -l response.zip | grep -q "\.stl$"; then
            echo "::error::no .stl file found in split output"
            exit 1
          fi

      - name: Container logs
        if: always()
        run: docker logs 3mfsplitter-ci || true

      - name: Stop container
        if: always()
        run: docker rm -f 3mfsplitter-ci || true
